<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="css/class.css">
</head>
<body>
    <header>
        <h1>Sudoku Solver</h1>
    </header>

    <main>
        <div class="examples">
            <label for="exampleSelect">Load example</label>
            <select id="exampleSelect" aria-label="Load example puzzle">
                <option value="">Choose a puzzle…</option>
            </select>
        </div>

        <div id="grid" class="grid" aria-label="Sudoku grid"></div>

        <div class="actions">
            <button id="btnSolve" type="button" class="btn btn-primary">Solve!</button>
            <button id="btnBack" type="button" class="btn" disabled title="Undo last solver step">Back</button>
            <button id="btnStep" type="button" class="btn">Step</button>
            <button id="btnStop" type="button" class="btn" disabled>Stop</button>
            <button id="btnClear" type="button" class="btn">Clear</button>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <p class="footer">
            <a href="https://github.com/dennybiasiolli/js-sudoku-solver" target="_blank" rel="noopener">View source on GitHub</a>
        </p>
    </main>

    <script src="js/solver.js"></script>
</body>
</html>
